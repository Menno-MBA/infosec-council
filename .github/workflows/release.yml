name: Release desktop skill

# When you push a version tag (e.g. v1.0.0) GitHub builds the uploadable
# Claude Desktop skill zip and attaches it to the matching Release, so the
# one-click download link in the README always points at the latest build.
# Nothing binary is ever committed to the repo.

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # lets you build it manually from the Actions tab

permissions:
  contents: write           # required to create/update the Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Strip stray NUL bytes from text files (sync safety net)
        run: |
          find . -path ./.git -prune -o -type f \( -name '*.md' -o -name '*.sh' -o -name '*.js' -o -name '*.json' -o -name '*.yml' -o -name '*.txt' \) -print | while read -r f; do
            tr -d '\000' < "$f" > "$f.tmp"
            if ! cmp -s "$f" "$f.tmp"; then mv "$f.tmp" "$f"; echo "stripped NUL bytes from $f"; else rm -f "$f.tmp"; fi
          done
      - name: Version parity + tag match (all three manifests agree; tag == version)
        run: node scripts/check-versions.js
      - name: Check the ChatGPT knowledge folder is in sync with canonical sources
        run: node scripts/sync-chatgpt.js --check
      - name: Report generator tests (golden file + report.js/report.sh parity + incident report)
        run: node scripts/test-reports.js
      - name: Build the desktop skill zip
        run: node bin/cli.js build-desktop
      - name: Build the Claude Code plugin zip
        run: node bin/cli.js build-plugin
      - name: Attach zips to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/infosec-council-desktop.zip
            dist/infosec-council-plugin.zip
          generate_release_notes: true
